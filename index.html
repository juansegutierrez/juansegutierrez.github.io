        /* --- THREE.JS COMPONENT --- */
        const SciFiBackground = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                const container = mountRef.current;
                if (!container) return;

                let width = container.clientWidth || window.innerWidth;
                let height = container.clientHeight || window.innerHeight;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
                camera.position.z = 4;

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(width, height);
                renderer.setPixelRatio(window.devicePixelRatio);
                container.appendChild(renderer.domElement);

                const geometry = new THREE.IcosahedronGeometry(1.8, 1);
                const material = new THREE.MeshBasicMaterial({
                    color: 0x00F0FF,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.15
                });
                const sphere = new THREE.Mesh(geometry, material);

                const coreGeometry = new THREE.IcosahedronGeometry(1, 0);
                const coreMaterial = new THREE.MeshBasicMaterial({
                    color: 0x0055FF,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.3
                });
                const core = new THREE.Mesh(coreGeometry, coreMaterial);

                scene.add(sphere);
                scene.add(core);

                const particlesGeometry = new THREE.BufferGeometry();
                const particleCount = 200;
                const posArray = new Float32Array(particleCount * 3);
                for (let i = 0; i < particleCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 10;
                }
                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const particlesMaterial = new THREE.PointsMaterial({
                    size: 0.02,
                    color: 0x00F0FF,
                    transparent: true,
                    opacity: 0.4
                });
                const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
                scene.add(particlesMesh);

                let animationFrameId;
                const animate = () => {
                    animationFrameId = requestAnimationFrame(animate);
                    sphere.rotation.x += 0.001;
                    sphere.rotation.y += 0.002;
                    core.rotation.x -= 0.002;
                    core.rotation.y -= 0.001;
                    particlesMesh.rotation.y += 0.0005;
                    renderer.render(scene, camera);
                };
                animate();

                const resizeObserver = new ResizeObserver((entries) => {
                    if (!entries || entries.length === 0) return;
                    const { width, height } = entries[0].contentRect;
                    if (width > 0 && height > 0) {
                        renderer.setSize(width, height);
                        camera.aspect = width / height;
                        camera.updateProjectionMatrix();
                    }
                });
                resizeObserver.observe(container);

                return () => {
                    resizeObserver.disconnect();
                    cancelAnimationFrame(animationFrameId);
                    if (container && renderer.domElement.parentNode) {
                        container.removeChild(renderer.domElement);
                    }
                    geometry.dispose();
                    material.dispose();
                    coreGeometry.dispose();
                    coreMaterial.dispose();
                    particlesGeometry.dispose();
                    particlesMaterial.dispose();
                    renderer.dispose();
                };
            }, []);

                    </div>
                </div>
            </section>
        );

        const HypedAlien = ({ messages }) => {
            const [msgIndex, setMsgIndex] = useState(0);
            const [showMsg, setShowMsg] = useState(false);

            useEffect(() => {
                const interval = setInterval(() => {
                    setShowMsg(true);
                    setTimeout(() => setShowMsg(false), 4000);
                    setTimeout(() => {
                        setMsgIndex(prev => (prev + 1) % messages.length);
                    }, 4500);
                }, 10000);
                return () => clearInterval(interval);
            }, [messages]);

            return (
                <div className="fixed bottom-4 right-4 z-50 flex flex-col items-end animate-float">
                    <div className="mb-2 mr-2 p-3 font-mono-custom text-xs font-bold clip-talk-bubble transition-opacity duration-300"
                         style={{ backgroundColor: '#00F0FF', color: '#000', maxWidth: '180px', opacity: showMsg ? 1 : 0 }}>
                        {messages[msgIndex]}
                    </div>
                    <div className="w-16 h-16 hover:scale-110 transition-transform cursor-pointer"
                         style={{ color: '#00F0FF' }}
                         onClick={() => { setShowMsg(true); setMsgIndex((msgIndex + 1) % messages.length); }}>
                        <svg viewBox="0 0 20 20" fill="currentColor">
                            <path d="M6 2h8v2H6V2z M4 4h2v2H4V4z M14 4h2v2h-2V4z M2 6h2v2H2V6z M16 6h2v2h-2V6z M2 8h2v2h2v2h8v-2h2V8h2v4h-2v2h-2v2h-2v-2h-2v2H8v-2H6v-2H4v-2H2V8z M6 8h2v2H6V8z M12 8h2v2h-2V8z" />
                        </svg>
                    </div>
                </div>
            );
        };

        const PaginationControls = ({ currentPage, totalPages, onPageChange, labels }) => {
            if (totalPages <= 1) return null;
            return (
                <div className="flex justify-center gap-4 mt-8">
                    <button
                        onClick={() => onPageChange(Math.max(0, currentPage - 1))}
                        disabled={currentPage === 0}
                        className="px-4 py-2 font-mono-custom text-xs font-bold"
                        style={{
                            border: '1px solid rgba(0,240,255,0.3)',
                            color: currentPage === 0 ? '#E0E0E0' : '#00F0FF',
                            opacity: currentPage === 0 ? 0.3 : 1,
                            cursor: currentPage === 0 ? 'not-allowed' : 'pointer',
                            background: 'transparent'
                        }}
                    >
                        &lt; {labels.prev}
                    </button>
                    <div className="flex items-center gap-2">
                        {[...Array(totalPages)].map((_, i) => (
                            <button key={i} onClick={() => onPageChange(i)}
                                    className="w-2 h-2 rounded-full"
                                    style={{ backgroundColor: i === currentPage ? '#00F0FF' : 'rgba(0,240,255,0.3)' }} />
                        ))}
                    </div>
                    <button
                        onClick={() => onPageChange(Math.min(totalPages - 1, currentPage + 1))}
                        disabled={currentPage === totalPages - 1}
                        className="px-4 py-2 font-mono-custom text-xs font-bold"
                        style={{
                            border: '1px solid rgba(0,240,255,0.3)',
                            color: currentPage === totalPages - 1 ? '#E0E0E0' : '#00F0FF',
                            opacity: currentPage === totalPages - 1 ? 0.3 : 1,
                            cursor: currentPage === totalPages - 1 ? 'not-allowed' : 'pointer',
                            background: 'transparent'
                        }}
                    >
                        {labels.next} &gt;
                    </button>
                </div>
            );
        };

        const Experience = ({ content }) => {
            const [page, setPage] = useState(0);
            const ITEMS_PER_PAGE = 4;
            const totalPages = Math.ceil(content.experience.length / ITEMS_PER_PAGE);
            const displayedItems = content.experience.slice(page * ITEMS_PER_PAGE, (page + 1) * ITEMS_PER_PAGE);

            return (
                <section id="experience" className="py-24 relative" style={{ backgroundColor: '#0B0E14' }}>
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="mb-16">
                            <h2 className="text-3xl font-orbitron font-bold text-white uppercase tracking-widest">{content.static.systemLog}</h2>
                            <p className="font-rajdhani uppercase tracking-widest" style={{ color: '#00F0FF' }}>{content.static.profExp}</p>
                        </div>
                        <div className="grid md:grid-cols-12 gap-12">
                            <div className="md:col-span-8">
                                <div className="space-y-8 pl-6" style={{ borderLeft: '1px solid rgba(0,240,255,0.2)' }}>
                                    {displayedItems.map((job, i) => (
                                        <div key={i} className="p-6 clip-corner-sm transition-all"
                                             style={{ backgroundColor: '#0F141E', border: '1px solid rgba(0,240,255,0.1)' }}
                                             onMouseEnter={e => e.currentTarget.style.borderColor = 'rgba(0,240,255,0.5)'}
                                             onMouseLeave={e => e.currentTarget.style.borderColor = 'rgba(0,240,255,0.1)'}>
                                            <div className="flex justify-between items-start mb-2 flex-wrap gap-2">
                                                <h4 className="text-lg font-bold font-orbitron text-white">{job.role}</h4>
                                                <span className="font-mono-custom text-xs px-2 py-1 rounded"
                                                      style={{ color: '#00F0FF', backgroundColor: 'rgba(0,240,255,0.05)' }}>{job.date}</span>
                                            </div>
                                            <p className="font-rajdhani uppercase text-sm mb-4 font-semibold"
                                               style={{ color: 'rgba(0,240,255,0.7)' }}>{job.org}</p>
                                            <p className="text-sm leading-relaxed mb-4 whitespace-pre-line"
                                               style={{ color: 'rgba(224,224,224,0.8)' }}>{job.desc}</p>
                                            <div className="flex flex-wrap gap-2 pt-4" style={{ borderTop: '1px solid rgba(0,240,255,0.1)' }}>
                                                {job.skills.map(skill => (
                                                    <span key={skill} className="text-xs px-2 py-1 font-mono-custom"
                                                          style={{ backgroundColor: 'rgba(0,240,255,0.05)', color: 'rgba(0,240,255,0.7)', border: '1px solid rgba(0,240,255,0.2)' }}>
                                                        {skill}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <PaginationControls currentPage={page} totalPages={totalPages} onPageChange={setPage}
                                    labels={{ prev: content.static.prev, next: content.static.next }} />
                            </div>
                            <div className="md:col-span-4 space-y-8">
                                <div className="p-6 clip-corner-sm" style={{ backgroundColor: '#0F141E', border: '1px solid rgba(0,240,255,0.1)' }}>
                                    <h4 className="font-orbitron font-bold mb-4 flex items-center gap-2 uppercase tracking-tighter" style={{ color: '#00F0FF' }}>
                                        <LucideIcon name="file-text" className="w-5 h-5" /> {content.static.education}
                                    </h4>
                                    <div className="mb-4">
                                        <p className="font-bold text-white">Florida State University</p>
                                        <p className="text-sm" style={{ color: 'rgba(224,224,224,0.6)' }}>{content.static.degree}</p>
                                        <div className="mt-2 text-xs font-mono-custom space-y-1">
                                            <p style={{ color: '#00F0FF' }}>{content.static.gpa}</p>
                                            <p style={{ color: 'rgba(224,224,224,0.4)' }}>{content.static.minors}</p>
                                        </div>
                                    </div>
                                    <div className="pt-4" style={{ borderTop: '1px solid rgba(0,240,255,0.1)' }}>
                                        <p className="text-xs font-mono-custom mb-2 uppercase tracking-wider" style={{ color: 'rgba(224,224,224,0.4)' }}>{content.static.leadership}</p>
                                        <div className="space-y-3">
                                            <div>
                                                <p className="text-sm font-bold text-white">Seminole Innovators</p>
                                                <p className="text-xs" style={{ color: '#00F0FF' }}>{content.static.si_role}</p>
                                            </div>
                                            <div>
                                                <p className="text-sm font-bold text-white">Environmental Service Program</p>
                                                <p className="text-xs" style={{ color: '#00F0FF' }}>{content.static.esp_role}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-6 clip-corner-sm" style={{ backgroundColor: '#0F141E', border: '1px solid rgba(0,240,255,0.1)' }}>
                                    <h4 className="font-orbitron font-bold mb-4 flex items-center gap-2 uppercase tracking-tighter" style={{ color: '#00F0FF' }}>
                                        <LucideIcon name="award" className="w-5 h-5" /> {content.static.credentials}
                                    </h4>
                                    <div className="space-y-4">
                                        {[
                                            { href: "https://www.coursera.org/account/accomplishments/specialization/ZMEQM8KPSQTD", title: "Google AI Essentials Specialization", sub: "Google • Dec 2025" },
                                            { href: "https://www.coursera.org/account/accomplishments/verify/2EGIVRVF9BJ8", title: "Excel Skills for Business", sub: "Macquarie University • Dec 2025" },
                                            { href: "https://www.coursera.org/account/accomplishments/specialization/JHQWIY2YZ5RO", title: "Data-Driven Decision Making", sub: "Google • Dec 2025" }
                                        ].map((cred, i) => (
                                            <React.Fragment key={i}>
                                                {i > 0 && <div className="h-px w-full" style={{ backgroundColor: 'rgba(0,240,255,0.1)' }}></div>}
                                                <a href={cred.href} target="_blank" rel="noreferrer" className="block">
                                                    <p className="text-sm font-bold text-white flex items-start gap-2 transition-colors"
                                                       onMouseEnter={e => e.currentTarget.style.color = '#00F0FF'}
                                                       onMouseLeave={e => e.currentTarget.style.color = 'white'}>
                                                        {cred.title} <LucideIcon name="external-link" className="w-3 h-3 mt-1 opacity-50" />
                                                    </p>
                                                    <p className="text-xs mt-1" style={{ color: 'rgba(224,224,224,0.6)' }}>{cred.sub}</p>
                                                </a>
                                            </React.Fragment>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    {content.skills.map((skill, i) => (
                                        <div key={i} className="flex justify-between items-center p-3 text-sm transition-colors"
                                             style={{ backgroundColor: '#0F141E', borderLeft: '2px solid rgba(0,240,255,0.3)' }}
                                             onMouseEnter={e => e.currentTarget.style.backgroundColor = 'rgba(0,240,255,0.05)'}
                                             onMouseLeave={e => e.currentTarget.style.backgroundColor = '#0F141E'}>
                                            <span className="font-bold text-white flex items-center gap-2">
                                                <LucideIcon name={skill.icon} className="w-4 h-4" style={{ color: '#00F0FF', opacity: 0.4 }} />
                                                {skill.name}
                                            </span>
                                            <span className="text-xs font-mono-custom uppercase" style={{ opacity: 0.4 }}>{skill.type}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Projects = ({ content }) => {
            const [page, setPage] = useState(0);
            const ITEMS_PER_PAGE = 6;
            const totalPages = Math.ceil(content.projects.length / ITEMS_PER_PAGE);
            const displayedItems = content.projects.slice(page * ITEMS_PER_PAGE, (page + 1) * ITEMS_PER_PAGE);

            return (
                <section id="projects" className="py-24" style={{ borderTop: '1px solid rgba(0,240,255,0.1)' }}>
                    <div className="max-w-7xl mx-auto px-6">
                        <h2 className="text-3xl font-orbitron font-bold text-white uppercase tracking-widest mb-12 flex items-center gap-3">
                            {content.static.projectDb}
                        </h2>
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {displayedItems.map(proj => (
                                <div key={proj.id} className="flex flex-col overflow-hidden transition-all"
                                     style={{ backgroundColor: '#0F141E', border: '1px solid rgba(0,240,255,0.2)' }}
                                     onMouseEnter={e => { e.currentTarget.style.borderColor = 'rgba(0,240,255,0.6)'; e.currentTarget.style.transform = 'translateY(-4px)'; }}
                                     onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(0,240,255,0.2)'; e.currentTarget.style.transform = 'none'; }}>
                                    <div className="p-3 flex justify-between items-center font-mono-custom"
                                         style={{ backgroundColor: 'rgba(0,240,255,0.1)', borderBottom: '1px solid rgba(0,240,255,0.2)', fontSize: '10px' }}>
                                        <span style={{ color: 'rgba(0,240,255,0.6)' }}>{content.static.idPrefix}{proj.id.toString().padStart(3, '0')}</span>
                                        <span style={{ color: proj.status === 'Completed' ? '#00F0FF' : '#facc15', fontWeight: 'bold' }}>
                                            {proj.status.toUpperCase()}
                                        </span>
                                    </div>
                                    <div className="p-6 flex-grow flex flex-col">
                                        <h3 className="font-orbitron font-bold text-white mb-2 uppercase text-lg transition-colors">{proj.title}</h3>
                                        <div className="font-mono-custom mb-3" style={{ fontSize: '10px', color: 'rgba(224,224,224,0.4)' }}>{proj.year}</div>
                                        <div className="flex flex-wrap gap-2 mb-4">
                                            {proj.stack.map(s => (
                                                <span key={s} className="px-1.5 py-0.5 font-mono-custom"
                                                      style={{ fontSize: '10px', backgroundColor: '#0B0E14', border: '1px solid rgba(0,240,255,0.2)', color: 'rgba(0,240,255,0.8)' }}>
                                                    {s}
                                                </span>
                                            ))}
                                        </div>
                                        <p className="text-sm mb-6 leading-relaxed flex-grow" style={{ opacity: 0.7 }}>{proj.desc}</p>
                                        {proj.link && (
                                            <a href={proj.link} target="_blank" rel="noreferrer"
                                               className="font-bold text-xs font-orbitron uppercase tracking-widest flex items-center gap-1"
                                               style={{ color: '#00F0FF' }}>
                                                {content.static.initiate}
                                                <LucideIcon name="external-link" className="w-3 h-3" />
                                            </a>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                        <PaginationControls currentPage={page} totalPages={totalPages} onPageChange={setPage}
                            labels={{ prev: content.static.prev, next: content.static.next }} />
                    </div>
                </section>
            );
        };

        const Awards = ({ content }) => {
            const [page, setPage] = useState(0);
            const ITEMS_PER_PAGE = 3;
            const totalPages = Math.ceil(content.awards.length / ITEMS_PER_PAGE);
            const displayedItems = content.awards.slice(page * ITEMS_PER_PAGE, (page + 1) * ITEMS_PER_PAGE);

            return (
                <section id="awards" className="py-24 relative" style={{ backgroundColor: '#0B0E14', borderTop: '1px solid rgba(0,240,255,0.1)' }}>
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="mb-16">
                            <h2 className="text-3xl font-orbitron font-bold text-white uppercase tracking-widest">{content.static.commendations}</h2>
                            <p className="font-rajdhani uppercase tracking-widest" style={{ color: '#00F0FF' }}>{content.static.honors}</p>
                        </div>
                        <div className="grid md:grid-cols-3 gap-6">
                            {displayedItems.map((award, i) => (
                                <div key={i} className="p-6 flex flex-col items-center text-center transition-all clip-corner relative overflow-hidden"
                                     style={{ backgroundColor: '#0F141E', border: '1px solid rgba(0,240,255,0.2)' }}
                                     onMouseEnter={e => e.currentTarget.style.borderColor = 'rgba(0,240,255,0.6)'}
                                     onMouseLeave={e => e.currentTarget.style.borderColor = 'rgba(0,240,255,0.2)'}>
                                    <div className="relative z-10">
                                        <div className="w-12 h-12 rounded-full flex items-center justify-center mb-4 mx-auto"
                                             style={{ backgroundColor: 'rgba(0,240,255,0.1)', border: '1px solid rgba(0,240,255,0.3)' }}>
                                            <LucideIcon name={award.icon} className="w-6 h-6" style={{ color: '#00F0FF' }} />
                                        </div>
                                        <h3 className="font-orbitron font-bold text-white text-lg mb-2">{award.title}</h3>
                                        <p className="font-mono-custom text-xs uppercase mb-1" style={{ color: 'rgba(0,240,255,0.7)' }}>{award.issuer}</p>
                                        <p className="font-rajdhani text-sm" style={{ color: 'rgba(224,224,224,0.5)' }}>{award.year}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <PaginationControls currentPage={page} totalPages={totalPages} onPageChange={setPage}
                            labels={{ prev: content.static.prev, next: content.static.next }} />
                    </div>
                </section>
            );
        };

        const Contact = ({ content }) => (
            <section id="comms" className="py-24 relative overflow-hidden" style={{ backgroundColor: '#080a0f' }}>
                <div className="absolute top-0 left-0 w-full h-px"
                     style={{ background: 'linear-gradient(to right, transparent, rgba(0,240,255,0.3), transparent)' }}></div>
                <div className="max-w-4xl mx-auto px-6 text-center">
                    <h2 className="text-3xl font-orbitron font-bold text-white uppercase tracking-widest mb-4">{content.static.commsArray}</h2>
                    <p className="font-rajdhani mb-12 uppercase tracking-widest" style={{ color: '#00F0FF' }}>{content.static.transmission}</p>
                    <div className="flex flex-col items-center justify-center space-y-6">
                        <div className="p-8 max-w-2xl w-full text-center clip-corner"
                             style={{ border: '1px solid rgba(0,240,255,0.1)', backgroundColor: 'rgba(15,20,30,0.5)' }}>
                            <div className="flex flex-col md:flex-row items-center justify-center gap-4 md:gap-8 font-mono-custom text-sm md:text-base">
                                <span className="transition-colors cursor-text"
                                      style={{ color: '#E0E0E0' }}
                                      onMouseEnter={e => e.target.style.color = '#00F0FF'}
                                      onMouseLeave={e => e.target.style.color = '#E0E0E0'}>
                                    {content.system.contact.email}
                                </span>
                                <span className="hidden md:inline" style={{ color: 'rgba(0,240,255,0.3)' }}>|</span>
                                <a href={content.system.contact.linkedin} target="_blank" rel="noreferrer"
                                   className="flex items-center gap-2 transition-colors"
                                   style={{ color: '#00F0FF' }}
                                   onMouseEnter={e => e.currentTarget.style.color = 'white'}
                                   onMouseLeave={e => e.currentTarget.style.color = '#00F0FF'}>
                                    {content.static.linkedinLabel} <LucideIcon name="external-link" className="w-4 h-4" />
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Footer = () => (
            <footer className="py-12 text-center font-mono-custom tracking-widest"
                    style={{ opacity: 0.4, fontSize: '10px', borderTop: '1px solid rgba(0,240,255,0.1)', letterSpacing: '0.2em' }}>
                &copy; {new Date().getFullYear()} JUAN S. GUTIERREZ | SYSTEM_CORE_V2.5.0
            </footer>
        );

        /* --- MAIN APP --- */
        function App() {
            const [scrolled, setScrolled] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen font-sans-custom" style={{ backgroundColor: '#0B0E14', color: '#E0E0E0' }}>
                    <Nav
                        content={DATA}
                        mobileMenuOpen={mobileMenuOpen}
                        toggleMobileMenu={() => setMobileMenuOpen(!mobileMenuOpen)}
                        closeMobileMenu={() => setMobileMenuOpen(false)}
                        scrolled={scrolled}
                    />
                    <Hero content={DATA} />
                    <Experience content={DATA} />
                    <Projects content={DATA} />
                    <Awards content={DATA} />
                    <Contact content={DATA} />
                    <HypedAlien messages={DATA.hype} />
                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
